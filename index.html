<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music UI Render</title>
  <link rel="icon" href="assets/icons/app.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
  <div class="app">
    <!-- Sidebar Controls -->
    <aside class="sidebar">
      <!-- Sticky header (mirrors the sticky action buttons at the bottom) -->
      <div class="sidebar-header">
        <h1>Music UI Render</h1>
        <button id="themeToggle" class="theme-toggle" title="Toggle theme">
          <img id="themeIcon" class="icon-invert" src="assets/icons/moon.svg" alt="Theme Toggle" width="32" height="32">
        </button>
      </div>

      <div class="sidebar-content">
        <!-- Spotify Link Autofill -->
        <div class="field">
          <label>Spotify link autofill</label>
          <div class="subfield">
            <input type="text" id="spotifyInput" placeholder="Paste Spotify track URL...">
            <div class="bar"></div>
          </div>
        </div>

        <!-- Album Art Upload -->
        <div class="field">
          <label>Album art</label>
          <div class="art-row">
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="artUpload" accept="image/*" hidden>
              <div class="upload-placeholder" id="uploadPlaceholder">
                <img class="icon-invert" src="assets/icons/image.svg" alt="" width="32" height="32">
                <span>Click or drag image</span>
              </div>
              <img id="uploadPreview" class="upload-preview" hidden>
            </div>

            <!-- Album Art Zoom & Crop -->
            <div class="zoom-controls">
              <button type="button" class="zoom-btn" id="zoomInBtn" title="Zoom in">
                <img class="icon-invert" src="assets/icons/zoom-in.svg" alt="Zoom in" width="32" height="32">
              </button>
              <span class="zoom-level" id="zoomLevel">100%</span>
              <button type="button" class="zoom-btn" id="zoomOutBtn" title="Zoom out">
                <img class="icon-invert" src="assets/icons/zoom-out.svg" alt="Zoom out" width="32" height="32">
              </button>
            </div>
          </div>
        </div>

        <!-- Title -->
        <div class="field">
          <label>Title</label>
          <div class="subfield">
            <input type="text" id="titleInput" placeholder="Title">
            <div class="bar"></div>
          </div>
        </div>

        <!-- Album -->
        <div class="field">
          <label>Album</label>
          <div class="subfield">
            <input type="text" id="albumInput" placeholder="Album Title">
            <div class="bar"></div>
          </div>
        </div>

        <!-- Artist + Duration Row -->
        <div style="display: flex; gap: 24px;">
          <div class="field" style="flex-grow: 1; width: 100%;">
            <label>Artist</label>
            <div class="subfield">
              <input type="text" id="artistInput" placeholder="Artist">
              <div class="bar"></div>
            </div>
          </div>

          <div class="field" style="flex-grow: 0; width: fit-content;">
            <label style="width: fit-content;">Duration</label>
            <div class="subfield">
              <input type="text" id="durationInput" placeholder="x:xx" size="1">
              <div class="bar"></div>
            </div>
          </div>
        </div>

        <!-- Picked By -->
        <div class="field">
          <label>Picked by</label>
          <div class="subfield">
            <div class="subfield" style="flex:1">
              <input type="text" id="pickedByInput" placeholder="Username">
              <div class="bar"></div>
            </div>
          </div>
        </div>

        <!-- Custom Intro Animation Toggle -->
        <div class="toggle-field">
          <div class="toggle-text">
            <label>Custom intro animation</label>
            <p class="hint">Stroke trim + content fade-in</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="animToggle">
            <span class="toggle-box">
              <img class="toggle-check" src="assets/icons/checkmark.svg" alt="" width="32" height="32">
            </span>
          </label>
        </div>

        <!-- Extra Styling Toggle -->
        <div class="toggle-field">
          <div>
            <label>Extra Styling</label>
            <p class="hint">Animated skull intro</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="extraToggle">
            <span class="toggle-box">
              <img class="toggle-check" src="assets/icons/checkmark.svg" alt="" width="32" height="32">
            </span>
          </label>
        </div>
      </div>

      <!-- Sticky bottom region: action buttons, with the rendering overlay floating above them -->
      <div class="sidebar-footer">
        <!-- Rendering frames — overlays the bottom of the scroll list (doesn't shrink it) -->
        <div class="render-status" id="renderStatus" hidden>
          <div class="render-status-head">
            <div class="render-anim">
              <div class="render-anim-frames"><img id="renderFrame" alt=""></div>
            </div>
            <span class="render-status-title" id="renderStatusTitle">Rendering frames</span>
          </div>

          <div class="render-bar-row">
            <span class="render-count" id="renderCount">0</span>
            <div class="render-progress" id="renderProgressTrack">
              <svg id="renderProgressSvg" height="14">
                <path id="renderProgressPath" fill="none" stroke-width="7" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
              <div id="renderThumb" class="render-thumb"></div>
            </div>
            <span class="render-count render-total" id="renderTotal">0</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
          <button id="previewBtn" class="btn">
            <span>Preview</span>
            <img class="btn-icon" src="assets/icons/preview.svg" alt="" width="24" height="24">
          </button>
          <button id="downloadBtn" class="btn">
            <span>Download</span>
            <img class="btn-icon" src="assets/icons/download.svg" alt="" width="24" height="24">
          </button>
        </div>
      </div>
    </aside>

    <!-- Preview Area -->
    <main class="preview-area">
      <canvas id="renderCanvas" width="522" height="178"></canvas>
    </main>
  </div>

  <script src="app.js?v=5"></script>
</body>

</html>
